<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5 | Login</title>

    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center">
    
    <div class="card w-96 bg-white shadow-md p-6">

        <div class="flex justify-center mb-3">
            <img src="./assets/github-logo.png" alt="This is a picture of github-logo">
        </div>

        <h2 class="text-center font-semibold text-lg">GitHub Issues Tracker</h2>
        <p class="text-center text-sm text-gray-500 mb-4">Sign in to manage your issues</p>

        <label class="text-sm mb-1" for="">Username</label>
        <input id="input-username" type="text" name="" placeholder="Enter Username" class="input input-bordered w-full mb-1"/>
        <a class="text-xs text-blue-500 mb-3 cursor-pointer" href="">Default: admin</a>

        <label class="text-sm mb-1" for="">Password</label>
        <input id="input-pass" type="password" name="" placeholder="Enter Password" class="input input-bordered w-full mb-1"/>
        <a class="text-xs text-blue-500 mb-3 cursor-pointer" href="">Default: admin123</a>

        <button id="login-btn" class="btn bg-blue-600 text-white hover:bg-blue-700 w-full mt-2">Sign In</button>

        <div class="flex items-center my-4">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-3 text-gray-400 text-sm">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>            
        </div>

        <p class="text-xs text-center text-gray-500 mb-2">Demo Credentials</p>
        <div class="bg-gray-100 text-center p-5 rounded">
            
            <p class="text-sm"><b>Username:</b> admin</p>
            <p class="text-sm"><b>Password:</b> admin123</p>
        </div>
    </div>
    


    <script src="./script/login.js"></script>
</body>
</html>
