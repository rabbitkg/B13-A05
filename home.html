<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-5 | Home</title>

    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen ">
    
    <nav class="bg-white shadow-sm">
        <div class="max-w-[93%] mx-auto px-4 flex justify-between items-center ">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-8" alt="This is a picture of github-logo" sizes="" srcset="">
                <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
            </div>
            
            <div class="flex justify-center my-4">
                <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                    <div>
                        <label class="input validator join-item flex items-center gap-2 w-full">
                        <i class="fa-brands fa-sistrix"></i>
                        <input id="input-search" type="text" placeholder="Search issues..." required />
                        </label>
                    </div>
                    <button id="btn-search" class="btn btn-primary join-item"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div> 
        </div>
    </nav>
    
    <section class="max-w-[1300px] mx-auto mt-8 px-4">
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6">
            <div class="flex gap-2">
                <button id="tab-all" class="tab-btn btn btn-primary btn-sm px-8">All</button>
                <button id="tab-open" class="tab-btn btn btn-outline btn-sm px-8">Open</button>
                <button id="tab-closed" class="tab-btn btn btn-outline btn-sm px-8">Closed</button>
            </div>
        </div>
        <div class="bg-white rounded-t-lg shadow-xl p-6 flex flex-col sm:flex-row gap-5 sm:justify-between sm:items-center">
            <div class="flex items-center gap-3">
                <div class="bg-purple-100 p-3 rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-lg font-semibold">
                        <span id="issue-count">0</span> Issues
                    </h2>
                    <p class="text-lg ">Track and manage your project issues </p>
                </div>
            </div>

            <div class="flex gap-4 text-sm">
                <div class="flex items-center gap-1 text-[16px]">
                    <div class="w-3 h-3 bg-green-600 rounded-full"></div>
                    Open
                </div>
                
                <div class="flex items-center gap-1 text-[16px]">
                    <div class="w-3 h-3 bg-purple-600 rounded-full"></div>
                    Closed
                </div>
            </div>
        </div>


        <div id="spinner" class="flex justify-center my-10 hidden">
            <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>
        <div class="px-5 py-1 bg-white/80 shadow-xl">
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-6">
            
            </div>
        </div>
    </section>
    

    <dialog id="issue_modal" class="modal">
        <div class="modal-box max-w-3xl w-11/12">
            <h3 id="modal-title" class="font-bold text-lg mb-3"></h3>
            <p id="modal-description" class="mb-3"></p>
            <div>
                <p><b>Status:</b> <span id="modal-status"></span></p>
                <p><b>Category:</b> <span id="modal-category"></span></p>
                <p><b>Author:</b> <span id="modal-author"></span></p>
                <p><b>Priority</b> <span id="modal-priority"></span></p>
                <p><b>Label:</b> <span id="modal-label"></span></p>
                <p><b>Created At:</b> <span id="modal-data"></span></p>
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    

    

    <script src="./script/main.js"></script>
</body>
</html>
